# Judge0 configuration (used by the opt-in `judge0` compose profile).
# Full reference: https://github.com/judge0/judge0/blob/master/judge0.conf

# ---- Redis ----
REDIS_HOST=judge0-redis
REDIS_PORT=6379

# ---- PostgreSQL (Judge0's own DB, separate from the app database) ----
POSTGRES_HOST=judge0-db
POSTGRES_PORT=5432
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=judge0

# ---- Server ----
RAILS_ENV=production
RAILS_MAX_THREADS=5

# ---- Execution limits (sensible defaults for a learning platform) ----
CPU_TIME_LIMIT=5
WALL_TIME_LIMIT=10
MAX_PROCESSES_AND_OR_THREADS=60
ENABLE_NETWORK=false

# ---- Optional auth token; mirror into JUDGE0_AUTH_TOKEN for the backend ----
# AUTHN_TOKEN=
