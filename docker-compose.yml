services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-codepath}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codepath}
      POSTGRES_DB: ${POSTGRES_DB:-codepath}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codepath} -d ${POSTGRES_DB:-codepath}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-codepath}:${POSTGRES_PASSWORD:-codepath}@postgres:5432/${POSTGRES_DB:-codepath}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      # Path INSIDE the container; the host key is mounted there via volumes below.
      FIREBASE_CREDENTIALS_FILE: ${FIREBASE_CREDENTIALS_FILE:-/run/secrets/firebase-key.json}
      AUTH_STUB_ENABLED: ${AUTH_STUB_ENABLED:-true}
      # Judge0 code execution. Set JUDGE0_RAPIDAPI_KEY to use the hosted RapidAPI
      # endpoint (no local containers); otherwise the backend uses JUDGE0_URL
      # (start it with `--profile judge0`) and degrades gracefully if unreachable.
      JUDGE0_RAPIDAPI_KEY: ${JUDGE0_RAPIDAPI_KEY:-}
      JUDGE0_RAPIDAPI_HOST: ${JUDGE0_RAPIDAPI_HOST:-judge0-ce.p.rapidapi.com}
      JUDGE0_URL: ${JUDGE0_URL:-http://judge0:2358}
      JUDGE0_AUTH_TOKEN: ${JUDGE0_AUTH_TOKEN:-}
      # AI (Gemini, Sprint 6). Empty key disables AI (endpoints return 503).
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_TEACHER_MODEL: ${GEMINI_TEACHER_MODEL:-gemini-2.5-flash}
      AI_RATE_LIMIT_PER_MINUTE: ${AI_RATE_LIMIT_PER_MINUTE:-8}
      AI_DAILY_LIMIT: ${AI_DAILY_LIMIT:-200}
      BACKEND_PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      # Mounts the Firebase service-account key read-only. Defaults to a harmless
      # in-repo file so `docker compose up` still works in stub mode with no .env;
      # set FIREBASE_CREDENTIALS_HOST_FILE to your key path to use real auth.
      - ${FIREBASE_CREDENTIALS_HOST_FILE:-./backend/.env.example}:/run/secrets/firebase-key.json:ro
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: dev
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
      VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-}
      VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN:-}
      VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:-}
      VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:-}
    ports:
      - "5173:5173"
    depends_on:
      - backend

  # --- Judge0 code execution (opt-in) ---------------------------------------
  # Start with:  docker compose --profile judge0 up
  # Heavy + requires a privileged container; on Docker Desktop / cgroup v2 it may
  # need extra host config. The core stack runs fine without it (execution
  # degrades gracefully), which is why it is behind a profile.
  judge0:
    image: judge0/judge0:1.13.1
    profiles: ["judge0"]
    volumes:
      - ./docker/judge0.conf:/judge0.conf:ro
    privileged: true
    ports:
      - "2358:2358"
    depends_on:
      - judge0-db
      - judge0-redis
    restart: unless-stopped

  judge0-workers:
    image: judge0/judge0:1.13.1
    profiles: ["judge0"]
    command: ["./scripts/workers"]
    volumes:
      - ./docker/judge0.conf:/judge0.conf:ro
    privileged: true
    depends_on:
      - judge0-db
      - judge0-redis
    restart: unless-stopped

  judge0-db:
    image: postgres:16-alpine
    profiles: ["judge0"]
    environment:
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0
      POSTGRES_DB: judge0
    volumes:
      - judge0-data:/var/lib/postgresql/data
    restart: unless-stopped

  judge0-redis:
    image: redis:7-alpine
    profiles: ["judge0"]
    command: ["redis-server", "--appendonly", "no"]
    restart: unless-stopped

volumes:
  postgres-data:
  judge0-data:
