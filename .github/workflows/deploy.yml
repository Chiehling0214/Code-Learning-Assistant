# Deploy to the production VM.
#
# Triggers:
#   - Automatically after CI (`ci.yml`) succeeds on `main` — SSH into the VM,
#     git pull, docker compose up -d --build.
#   - Or manually via Actions → Deploy → Run workflow.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   VM_HOST     — the VM's external IP (e.g. 35.201.240.19)
#   VM_USER     — the SSH user on the VM (e.g. beard)
#   VM_SSH_KEY  — a private key whose public half is in the VM's ~/.ssh/authorized_keys
name: Deploy

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    # Skip auto-deploy if CI failed (the manual trigger has no workflow_run to check).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Pull latest and restart the stack on the VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            cd /opt/codepath
            git pull --ff-only origin main
            docker compose -f docker-compose.prod.yml up -d --build
            docker image prune -f
